name: Deploy Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'Admin-Website/**'
      - 'PULSE-AID-WEB/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build PULSE-AID-WEB
        working-directory: PULSE-AID-WEB
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Build Admin-Website
        working-directory: Admin-Website
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Combine builds
        run: |
          mkdir -p _site
          cp -r PULSE-AID-WEB/dist/* _site/
          cp -r Admin-Website/dist _site/admin
          cp _site/index.html _site/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
